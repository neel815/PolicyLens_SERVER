[pytest]
# Pytest configuration for PolicyLens backend tests

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Asyncio mode
asyncio_mode = auto

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Markers for categorizing tests
markers =
    asyncio: async test
    integration: integration tests
    unit: unit tests
    auth: authentication tests
    security: security tests
